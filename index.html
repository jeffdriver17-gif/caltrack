  const [y,m,day] = d.split('-').map(Number);
  const dt = new Date(y,m-1,day);
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((dt - now) / 86400000);
  if(diff===0) return 'Today';
  if(diff===-1) return 'Yesterday';
  if(diff===1) return 'Tomorrow';
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function addDays(d, n) {
  const [y,m,day] = d.split('-').map(Number);
  const dt = new Date(y,m-1,day+n);
  return dt.toISOString().split('T')[0];
}
function r1(n) { return Math.round(n*10)/10; }

function CircularProgress({value, max, size=150, stroke=13, color='#10b981', children}) {
  const r2 = (size-stroke)/2;
  const circ = 2*Math.PI*r2;
  const pct = Math.min(Math.max(value/max,0),1);
  const dash = pct*circ;
  return (
    <div className="ring-container" style={{width:size,height:size,position:'relative'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',display:'block'}}>
        <circle cx={size/2} cy={size/2} r={r2} fill="none" stroke="#e5e7eb" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r2} fill="none" stroke={color}
          strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={`${dash} ${circ}`} style={{transition:'stroke-dasharray 0.5s ease'}}/>
      </svg>
      <div className="ring-center">{children}</div>
    </div>
  );
}

function ProfileScreen({onSelect}) {
  const [profiles, setProfiles]   = React.useState([]);
  const [loading, setLoading]     = React.useState(true);
  const [view, setView]           = React.useState('list'); // 'list' | 'login' | 'create'
  const [selected, setSelected]   = React.useState(null);
  const [pin, setPin]             = React.useState('');
  const [newName, setNewName]     = React.useState('');
  const [newEmoji, setNewEmoji]   = React.useState('😀');
  const [newPin, setNewPin]       = React.useState('');
  const [newPin2, setNewPin2]     = React.useState('');
  const [err, setErr]             = React.useState('');
  const [busy, setBusy]           = React.useState(false);

  React.useEffect(()=>{ loadProfiles(); },[]);

  async function loadProfiles() {
    setLoading(true);
    const { data } = await sb.from('ct_profiles').select('id,name,emoji').order('created_at');
    setProfiles(data||[]);
    setLoading(false);
  }

  function startLogin(p) { setSelected(p); setPin(''); setErr(''); setView('login'); }

  async function doLogin() {
    if(!pin) return setErr('Enter your PIN');
    setBusy(true); setErr('');
    const h = await hashPin(pin);
    const { data } = await sb.from('ct_profiles').select('id,name,emoji').eq('id', selected.id).eq('pin_hash', h).single();
    setBusy(false);
    if(!data) return setErr('Wrong PIN — try again');
    localStorage.setItem('ct_active', JSON.stringify(data));
    onSelect(data);
  }

  async function doCreate() {
    const name = newName.trim();
    if(!name) return setErr('Enter a name');
    if(newPin.length < 4) return setErr('PIN must be at least 4 digits');
    if(newPin !== newPin2) return setErr('PINs do not match');
    setBusy(true); setErr('');
    const pin_hash = await hashPin(newPin);
    const { data, error } = await sb.from('ct_profiles').insert({name, emoji:newEmoji, pin_hash}).select('id,name,emoji').single();
    setBusy(false);
    if(error) return setErr('Error creating profile — try again');
    localStorage.setItem('ct_active', JSON.stringify(data));
    onSelect(data);
  }

  if(loading) return (
    <div className="profile-screen" style={{justifyContent:'center',gap:16}}>
      <div className="profile-logo">🥗</div>
      <div style={{color:'white',fontSize:18,fontWeight:600}}>Loading…</div>
    </div>

  // ── PIN entry screen ──
  if(view === 'login') return (
    <div className="profile-screen">
      <div className="profile-logo">🥗</div>
      <div className="profile-app-name">CalTrack</div>
      <div className="profile-tagline">Your personal calorie & macro tracker</div>
      <div className="profile-card">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
          <span style={{fontSize:40}}>{selected.emoji}</span>
          <div>
            <div style={{fontSize:20,fontWeight:800}}>{selected.name}</div>
            <div style={{fontSize:13,color:'var(--subtext)'}}>Enter your PIN to continue</div>
          </div>
        </div>
        <div style={{display:'flex',gap:12,marginBottom:16}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{flex:1,height:12,borderRadius:6,background: pin.length>i ? 'var(--green)' : 'var(--border)',transition:'background 0.15s'}}/>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
          {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k,i)=>(
            <button key={i} onClick={()=>{
              if(k==='⌫') setPin(p=>p.slice(0,-1));
              else if(k!=='' && pin.length<8) setPin(p=>p+k);
            }} style={{padding:'16px 0',fontSize:22,fontWeight:600,borderRadius:14,border:k===''?'none':'2px solid var(--border)',background:k===''?'transparent':'white',cursor:k===''?'default':'pointer',color:k==='⌫'?'var(--red)':'var(--text)'}}>
              {k}
            </button>
          ))}
        </div>
        {err && <div style={{color:'var(--red)',fontSize:13,textAlign:'center',marginBottom:10}}>{err}</div>}
        <button className="btn btn-primary btn-block" onClick={doLogin} disabled={busy||pin.length<4}>
          {busy ? 'Checking…' : 'Unlock →'}
        </button>
        <button className="btn btn-secondary btn-block" style={{marginTop:10}} onClick={()=>{setView('list');setErr('');}}>← Back</button>
      </div>
    </div>
  );

  // ── Create profile screen ──
  if(view === 'create') return (
    <div className="profile-screen">
      <div className="profile-logo">🥗</div>
      <div className="profile-app-name">CalTrack</div>
      <div className="profile-tagline">Your personal calorie & macro tracker</div>
      <div className="profile-card">
        <div className="profile-card-title">✨ Create your profile</div>
        <div style={{fontSize:12,fontWeight:600,color:'var(--subtext)',marginBottom:6}}>CHOOSE AN AVATAR</div>
        <div className="emoji-grid" style={{marginBottom:14}}>
          {PROFILE_EMOJIS.map(e=>(
            <button key={e} className={`emoji-option${newEmoji===e?' selected':''}`} onClick={()=>setNewEmoji(e)}>{e}</button>
          ))}
        </div>
        <div style={{marginBottom:10}}>
          <div className="form-label">YOUR NAME</div>
          <input type="text" placeholder="e.g. Jeff" value={newName} onChange={e=>{setNewName(e.target.value);setErr('');}}
            style={{background:'var(--bg)',border:'1.5px solid transparent',borderRadius:10,padding:'12px 14px',fontSize:16,width:'100%',outline:'none',color:'var(--text)'}}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div>
            <div className="form-label">PIN (4+ digits)</div>
            <input type="password" inputMode="numeric" placeholder="••••" value={newPin} onChange={e=>{setNewPin(e.target.value.replace(/\D/g,''));setErr('');}}
              style={{background:'var(--bg)',border:'1.5px solid transparent',borderRadius:10,padding:'12px 14px',fontSize:16,width:'100%',outline:'none',color:'var(--text)'}}/>
          </div>
          <div>
            <div className="form-label">CONFIRM PIN</div>
            <input type="password" inputMode="numeric" placeholder="••••" value={newPin2} onChange={e=>{setNewPin2(e.target.value.replace(/\D/g,''));setErr('');}}
              style={{background:'var(--bg)',border:'1.5px solid transparent',borderRadius:10,padding:'12px 14px',fontSize:16,width:'100%',outline:'none',color:'var(--text)'}}/>
          </div>
        </div>
        {err && <div style={{color:'var(--red)',fontSize:13,marginBottom:10}}>{err}</div>}
        <button className="btn btn-primary btn-block" onClick={doCreate} disabled={busy}>
          {busy ? 'Creating…' : 'Create Profile →'}
        </button>
        <button className="btn btn-secondary btn-block" style={{marginTop:10}} onClick={()=>{setView('list');setErr('');}}>← Back</button>
      </div>
    </div>
  );

  // ── Profile list ──
  return (
    <div className="profile-screen">
      <div className="profile-logo">🥗</div>
      <div className="profile-app-name">CalTrack</div>
      <div className="profile-tagline">Your personal calorie & macro tracker</div>
      <div className="profile-card">
        {profiles.length > 0 ? (
          <>
            <div className="profile-card-title">👋 Who's tracking today?</div>
            <div className="profile-list">
              {profiles.map(p=>(
                <button key={p.id} className="profile-btn" onClick={()=>startLogin(p)}>
                  <div className="profile-btn-emoji">{p.emoji}</div>
                  <div className="profile-btn-info">
                    <div className="profile-btn-name">{p.name}</div>
                    <div className="profile-btn-sub">Tap to enter PIN</div>
                  </div>
                  <span className="profile-btn-arrow">›</span>
                </button>
              ))}
            </div>
            <div className="profile-divider">
              <div className="profile-divider-line"/>
              <div className="profile-divider-text">OR</div>
              <div className="profile-divider-line"/>
            </div>
          </>
        ) : (
          <div className="profile-card-title" style={{marginBottom:16}}>✨ Create your first profile</div>
        )}
        <button className="btn btn-primary btn-block" onClick={()=>{setErr('');setView('create');}}>+ New Profile</button>
      </div>

  );

// ── ProfileGate ───────────────────────────────────────────────────────────────
function ProfileGate() {
  const [activeProfile, setActiveProfile] = React.useState(()=>{
    try{return JSON.parse(localStorage.getItem('ct_active')||'null')}catch(e){return null}
  });
  function selectProfile(p) { setActiveProfile(p); }
  function switchProfile() {
    localStorage.removeItem('ct_active');
    setActiveProfile(null);
  }
  if(!activeProfile) return <ProfileScreen onSelect={selectProfile}/>;
  return <App profileId={activeProfile.id} profileName={activeProfile.name} profileEmoji={activeProfile.emoji} onSwitchProfile={switchProfile}/>;
}

function App({profileId, profileName, profileEmoji, onSwitchProfile}) {
  const [tab, setTab] = useState('dashboard');
  const [date, setDate] = useState(todayStr);
  const [log, setLog] = useState({});
  const [recipes, setRecipes] = useState([]);
  const [goals, setGoals] = useState(DEFAULT_GOALS);
  const [water, setWater] = useState({});
  const [addModal, setAddModal] = useState(null);
  const [recipeModal, setRecipeModal] = useState(null);
  const [logRecipeModal, setLogRecipeModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [defaultMeal, setDefaultMeal] = useState('Breakfast');
  const [syncing, setSyncing] = useState(true);

  // ── Load all data from Supabase on mount ──────────────────────────────────
  useEffect(()=>{
    async function loadAll() {
      setSyncing(true);
      const [logsRes, recipesRes, goalsRes, waterRes] = await Promise.all([
        sb.from('ct_food_logs').select('*').eq('profile_id', profileId),
        sb.from('ct_recipes').select('*').eq('profile_id', profileId),
        sb.from('ct_goals').select('*').eq('profile_id', profileId).single(),
        sb.from('ct_water').select('*').eq('profile_id', profileId),
      ]);
      // Build log dict: {date: [entries]}
      const logDict = {};
      for(const row of (logsRes.data||[])){
        const e = {id:row.id,foodId:row.food_id,name:row.name,srv:row.srv,qty:row.qty,
          cal:row.cal,p:row.p,c:row.c,f:row.f,meal:row.meal,time:row.time};
        if(!logDict[row.date]) logDict[row.date]=[];
        logDict[row.date].push(e);
      }
      setLog(logDict);
      setRecipes((recipesRes.data||[]).map(r=>({id:r.id,name:r.name,servings:r.servings,
        cal:r.cal,p:r.p,c:r.c,f:r.f,ingredients:r.ingredients||[]})));
      if(goalsRes.data) setGoals({calories:goalsRes.data.calories,protein:goalsRes.data.protein,
        carbs:goalsRes.data.carbs,fat:goalsRes.data.fat});
      const waterDict = {};
      for(const row of (waterRes.data||[])) waterDict[row.date]=row.glasses;
      setWater(waterDict);
      setSyncing(false);
    }
    loadAll();
  },[profileId]);

  const showToast = useCallback(msg=>{ setToast(msg); setTimeout(()=>setToast(null),2000); },[]);
  const dayEntries = useMemo(()=>log[date]||[],[log,date]);
  const dayTotals = useMemo(()=>dayEntries.reduce((a,e)=>({cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{cal:0,p:0,c:0,f:0}),[dayEntries]);
  const waterToday = water[date]||0;

  async function addEntry(food, qty, meal) {
    const entry = {id:uid(),foodId:food.id,name:food.name,srv:food.srv,qty,
      cal:r1(food.cal*qty),p:r1(food.p*qty),c:r1(food.c*qty),f:r1(food.f*qty),
      meal,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
    setLog(prev=>({...prev,[date]:[...(prev[date]||[]),entry]}));
    showToast('Added '+food.name);
    await sb.from('ct_food_logs').insert({id:entry.id,profile_id:profileId,date,
      name:entry.name,srv:entry.srv,qty,cal:entry.cal,p:entry.p,c:entry.c,f:entry.f,
      meal,time:entry.time,food_id:food.id||null});
  }
  async function removeEntry(id) {
    setLog(prev=>({...prev,[date]:(prev[date]||[]).filter(e=>e.id!==id)}));
    await sb.from('ct_food_logs').delete().eq('id',id);
  }
  async function saveRecipe(recipe) {
    if(recipe.id){
      const updated = {...recipe};
      setRecipes(prev=>prev.map(r=>r.id===recipe.id?updated:r));
      showToast('Recipe updated!');
      await sb.from('ct_recipes').update({name:recipe.name,servings:recipe.servings,
        cal:recipe.cal,p:recipe.p,c:recipe.c,f:recipe.f,ingredients:recipe.ingredients})
        .eq('id',recipe.id);
    } else {
      const newR = {...recipe,id:uid()};
      setRecipes(prev=>[...prev,newR]);
      showToast('Recipe saved!');
      await sb.from('ct_recipes').insert({id:newR.id,profile_id:profileId,name:newR.name,
        servings:newR.servings,cal:newR.cal,p:newR.p,c:newR.c,f:newR.f,ingredients:newR.ingredients});
    }
  }
  async function deleteRecipe(id) {
    setRecipes(prev=>prev.filter(r=>r.id!==id));
    showToast('Recipe deleted');
    await sb.from('ct_recipes').delete().eq('id',id);
  }
  async function logRecipe(recipe, qty, meal) {
    const entry = {id:uid(),foodId:null,name:recipe.name+' (recipe)',srv:`${qty} serving${qty!==1?'s':''}`,qty,
      cal:r1(recipe.cal*qty),p:r1(recipe.p*qty),c:r1(recipe.c*qty),f:r1(recipe.f*qty),meal,
      time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
    setLog(prev=>({...prev,[date]:[...(prev[date]||[]),entry]}));
    showToast('Logged '+recipe.name);
    await sb.from('ct_food_logs').insert({id:entry.id,profile_id:profileId,date,
      name:entry.name,srv:entry.srv,qty,cal:entry.cal,p:entry.p,c:entry.c,f:entry.f,
      meal,time:entry.time,food_id:null});
  }
  async function saveGoals(g) {
    setGoals(g);
    await sb.from('ct_goals').upsert({profile_id:profileId,calories:g.calories,
      protein:g.protein,carbs:g.carbs,fat:g.fat,updated_at:new Date().toISOString()});
  }
  async function saveWater(date, glasses) {
    setWater(prev=>({...prev,[date]:glasses}));
    await sb.from('ct_water').upsert({profile_id:profileId,date,glasses});
  }
  function closeAll(){ setAddModal(null); setRecipeModal(null); setLogRecipeModal(null); }

  if(syncing) return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,background:'var(--bg)'}}>
      <span style={{fontSize:48}}>🥗</span>
      <div style={{fontSize:15,fontWeight:600,color:'var(--subtext)'}}>Loading your data…</div>
    </div>
  );

  return (
    <div className="app">
      {toast && <div key={toast+Date.now()} className="toast">{toast}</div>}
      <div className="header">
        <div className="header-inner">
          <button onClick={onSwitchProfile} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:6,padding:0}}>
            <span style={{fontSize:26,lineHeight:1}}>{profileEmoji}</span>
            <span style={{fontSize:13,fontWeight:600,color:'var(--subtext)',maxWidth:60,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profileName}</span>
          </button>
          <div className="date-nav">
            <button className="date-btn" onClick={()=>setDate(d=>addDays(d,-1))}>&#8249;</button>
            <span className="date-label" onClick={()=>setDate(todayStr())}>{fmtDate(date)}</span>
            <button className="date-btn" onClick={()=>setDate(d=>addDays(d,1))}>&#8250;</button>
          </div>
          <span style={{fontSize:19,fontWeight:800,color:'var(--green)'}}>CalTrack</span>
        </div>
      </div>
      <div className="scroll-area">
        {tab==='dashboard' && <DashboardTab date={date} entries={dayEntries} totals={dayTotals} goals={goals} waterToday={waterToday} onWater={glasses=>saveWater(date,glasses)} onAddFood={meal=>{setDefaultMeal(meal);setTab('search');}} onRemove={removeEntry}/>}
        {tab==='search' && <SearchTab defaultMeal={defaultMeal} onAdd={addEntry}/>}
        {tab==='recipes' && <RecipesTab recipes={recipes} onNew={()=>setRecipeModal({mode:'new',recipe:null})} onView={r=>setRecipeModal({mode:'view',recipe:r})} onLog={r=>setLogRecipeModal(r)}/>}
        {tab==='settings' && <SettingsTab goals={goals} setGoals={saveGoals} log={log} onSwitchProfile={onSwitchProfile} profileName={profileName} profileEmoji={profileEmoji}/>}
      </div>
      <nav className="bottom-nav">
        {[{id:'dashboard',icon:'📊',label:'Dashboard'},{id:'search',icon:'🔍',label:'Log Food'},{id:'recipes',icon:'📖',label:'Recipes'},{id:'settings',icon:'⚙️',label:'Goals'}].map(n=>(
          <button key={n.id} className={`nav-item${tab===n.id?' active':''}`} onClick={()=>setTab(n.id)}>
            <span className="nav-icon">{n.icon}</span><span>{n.label}</span>
          </button>
        ))}
      </nav>
      {addModal && <AddFoodModal food={addModal.food} defaultMeal={addModal.meal||defaultMeal} onAdd={(qty,meal)=>{addEntry(addModal.food,qty,meal);closeAll();}} onClose={closeAll}/>}
      {recipeModal && <RecipeModal mode={recipeModal.mode} recipe={recipeModal.recipe} onSave={r=>{saveRecipe(r);closeAll();}} onDelete={id=>{deleteRecipe(id);closeAll();}} onLog={r=>{closeAll();setLogRecipeModal(r);}} onClose={closeAll}/>}
      {logRecipeModal && <LogRecipeModal recipe={logRecipeModal} onLog={(qty,meal)=>{logRecipe(logRecipeModal,qty,meal);closeAll();}} onClose={closeAll}/>}
    </div>
  );
}

      </div>
      {MEALS.map(meal=>{
        const me = entries.filter(e=>e.meal===meal);
        const mc = me.reduce((s,e)=>s+e.cal,0);
        return (
          <div key={meal} className="card">
            <div className="meal-header">
              <span className="meal-title">{MEAL_ICONS[meal]} {meal}</span>
              {mc>0 && <span style={{fontSize:13,fontWeight:600,color:'var(--subtext)'}}>{Math.round(mc)} cal</span>}
            </div>
            {me.length===0 && <div style={{fontSize:13,color:'var(--subtext)',marginBottom:4}}>Nothing logged yet</div>}
            {me.map(e=>(
              <div key={e.id} className="log-entry">
                <div className="log-entry-info">
                  <div className="log-entry-name">{e.name}</div>
                  <div className="log-entry-meta">{e.qty!==1?`${e.qty}x · `:''}P:{r1(e.p)}g  C:{r1(e.c)}g  F:{r1(e.f)}g</div>
                </div>
                <span style={{fontSize:13,fontWeight:700}}>{Math.round(e.cal)}</span>
                <button className="delete-btn" onClick={()=>onRemove(e.id)}>×</button>
              </div>
            ))}
            <button className="add-row-btn" onClick={()=>onAddFood(meal)}>＋ Add food</button>
          </div>
        );
      })}
    </div>
  );
}

function SearchTab({defaultMeal, onAdd}) {
  const [q, setQ] = useState('');
  const [cat, setCat] = useState('All');
  const [selected, setSelected] = useState(null);
  const results = useMemo(()=>{
    let list = FOODS;
    if(cat!=='All') list = list.filter(f=>f.cat===cat);
    if(q) { const lq=q.toLowerCase(); list=list.filter(f=>f.name.toLowerCase().includes(lq)||f.cat.toLowerCase().includes(lq)); }
    return list;
  },[q,cat]);
  return (
    <div>
      <div style={{padding:'12px 12px 0'}}>
        <input type="search" placeholder="Search 170+ foods..." value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="chips-row" style={{paddingTop:8,paddingBottom:8}}>
        {CATEGORIES.map(c=>(
          <div key={c} className={`chip${cat===c?' active':''}`} onClick={()=>setCat(c)}>{c}</div>
        ))}
      </div>
      <div className="card" style={{padding:0,overflow:'hidden'}}>
        {results.length===0 && <div className="empty-state"><div style={{fontSize:36,marginBottom:8}}>🤷</div><div style={{fontSize:14}}>No foods found</div></div>}
        {results.slice(0,60).map(food=>(
          <div key={food.id} className="food-item" onClick={()=>setSelected(food)}>
            <div className="food-icon" style={{background:CAT_BG[food.cat]||'#f9fafb'}}><span>{food.icon}</span></div>
            <div className="food-info">
              <div className="food-name">{food.name}</div>
              <div className="food-meta">{food.srv}</div>
              <div style={{display:'flex',gap:4,marginTop:3}}>
                <span className="macro-pill pill-p">P{food.p}g</span>

    </div>
  );
}

function RecipeModal({mode, recipe, onSave, onDelete, onLog, onClose}) {
  const [name, setName] = useState(recipe?.name||'');
  const [servings, setServings] = useState(recipe?.servings||1);
  const [ingredients, setIngredients] = useState(recipe?.ingredients||[]);
  const [search, setSearch] = useState('');
  const [showSearch, setShowSearch] = useState(false);
  const [ingQty, setIngQty] = useState({});
  const isView = mode==='view';

  const totals = useMemo(()=>{
    const t = ingredients.reduce((a,i)=>({cal:a.cal+i.cal,p:a.p+i.p,c:a.c+i.c,f:a.f+i.f}),{cal:0,p:0,c:0,f:0});
    const s = Math.max(servings,1);
    return {cal:r1(t.cal/s),p:r1(t.p/s),c:r1(t.c/s),f:r1(t.f/s)};
  },[ingredients,servings]);

  const filteredFoods = useMemo(()=>{
    if(!search) return FOODS.slice(0,25);
    const lq=search.toLowerCase();
    return FOODS.filter(f=>f.name.toLowerCase().includes(lq)||f.cat.toLowerCase().includes(lq)).slice(0,30);
  },[search]);

  function addIng(food) {
    const qty = parseFloat(ingQty[food.id])||1;
    setIngredients(prev=>[...prev,{foodId:food.id,name:food.name,icon:food.icon,srv:food.srv,qty,cal:r1(food.cal*qty),p:r1(food.p*qty),c:r1(food.c*qty),f:r1(food.f*qty)}]);
    setShowSearch(false); setSearch('');
    setIngQty(prev=>{const n={...prev};delete n[food.id];return n;});
  }
  function removeIng(idx) { setIngredients(prev=>prev.filter((_,i)=>i!==idx)); }
  const canSave = name.trim() && ingredients.length>0;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxHeight:'92vh'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-header">
          <span className="modal-title">{isView?'📖 '+recipe.name:'🍳 Build Recipe'}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div style={{padding:16}}>
          {!isView && (
            <>
              <div style={{marginBottom:12}}>
                <div className="form-label">Recipe name</div>
                <input type="text" placeholder="e.g. Morning Smoothie Bowl" value={name} onChange={e=>setName(e.target.value)}/>
              </div>
              <div style={{marginBottom:12}}>
                <div className="form-label">Makes how many servings?</div>
                <input type="number" value={servings} min="1" step="0.5" onChange={e=>setServings(parseFloat(e.target.value)||1)}/>
              </div>
            </>
          )}
          {ingredients.length>0 && (
            <div style={{background:'var(--green-light)',borderRadius:12,padding:12,marginBottom:14,display:'flex',justifyContent:'space-around',textAlign:'center'}}>
              <div><div style={{fontSize:20,fontWeight:800,color:'var(--green)'}}>{Math.round(totals.cal)}</div><div style={{fontSize:10,color:'var(--green-dark)'}}>cal/srv</div></div>
              <div><div style={{fontSize:16,fontWeight:700,color:'#3b82f6'}}>{totals.p}g</div><div style={{fontSize:10,color:'var(--subtext)'}}>protein</div></div>
              <div><div style={{fontSize:16,fontWeight:700,color:'#f59e0b'}}>{totals.c}g</div><div style={{fontSize:10,color:'var(--subtext)'}}>carbs</div></div>
              <div><div style={{fontSize:16,fontWeight:700,color:'#ef4444'}}>{totals.f}g</div><div style={{fontSize:10,color:'var(--subtext)'}}>fat</div></div>
            </div>
          )}
          <div style={{fontWeight:700,fontSize:14,marginBottom:8}}>Ingredients</div>
          {ingredients.length===0 && <div style={{fontSize:13,color:'var(--subtext)',marginBottom:8}}>No ingredients yet</div>}
          {ingredients.map((ing,i)=>(
            <div key={i} className="log-entry">
              <span style={{fontSize:18}}>{ing.icon||'🍽️'}</span>
              <div className="log-entry-info">
                <div className="log-entry-name">{ing.name}</div>
                <div className="log-entry-meta">{ing.qty!==1?`${ing.qty}x `:''}1 serving · {Math.round(ing.cal)} cal</div>
              </div>
              {!isView && <button className="delete-btn" onClick={()=>removeIng(i)}>×</button>}
            </div>
          ))}
          {!isView && !showSearch && (
            <button className="add-row-btn" onClick={()=>setShowSearch(true)}>＋ Add ingredient</button>
          )}
          {!isView && showSearch && (
            <div style={{marginTop:8}}>
              <input type="search" placeholder="Search ingredient..." value={search} onChange={e=>setSearch(e.target.value)} autoFocus style={{marginBottom:8}}/>
              <div style={{maxHeight:180,overflowY:'auto',borderRadius:10,border:'1.5px solid var(--border)'}}>
                {filteredFoods.map(food=>(
                  <div key={food.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderBottom:'1px solid var(--bg)',background:'white',cursor:'pointer'}}>
                    <span style={{fontSize:18}}>{food.icon}</span>
                    <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>addIng(food)}>
                      <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{food.name}</div>
                      <div style={{fontSize:11,color:'var(--subtext)'}}>{food.srv} · {food.cal} cal</div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:4}} onClick={e=>e.stopPropagation()}>
                      <input type="number" value={ingQty[food.id]||'1'} min="0.25" step="0.5"
                        onChange={e=>setIngQty(prev=>({...prev,[food.id]:e.target.value}))}
                        style={{width:44,fontSize:13,padding:'4px 6px',textAlign:'center'}}/>
                      <button className="btn btn-primary btn-sm" onClick={()=>addIng(food)}>+</button>
                    </div>
                  </div>
                ))}
              </div>
              <button className="btn btn-secondary btn-sm" style={{marginTop:8,width:'100%'}} onClick={()=>setShowSearch(false)}>Cancel</button>
            </div>
          )}
          <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8}}>
            {isView ? (
              <>
                <button className="btn btn-primary btn-block" onClick={()=>onLog(recipe)}>Log This Recipe</button>
                <button className="btn btn-danger btn-block" onClick={()=>onDelete(recipe.id)}>Delete Recipe</button>
              </>
            ) : (
              <button className="btn btn-primary btn-block" disabled={!canSave} style={{opacity:canSave?1:0.5}}
                onClick={()=>{if(canSave)onSave({...(recipe||{}),name:name.trim(),servings:Math.max(1,servings),ingredients,...totals});}}>
                {recipe?'Update Recipe':'Save Recipe'}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

            <div><div style={{fontSize:18,fontWeight:700,color:'#3b82f6'}}>{r1(recipe.p*q)}g</div><div style={{fontSize:11,color:'var(--subtext)'}}>protein</div></div>
            <div><div style={{fontSize:18,fontWeight:700,color:'#f59e0b'}}>{r1(recipe.c*q)}g</div><div style={{fontSize:11,color:'var(--subtext)'}}>carbs</div></div>
            <div><div style={{fontSize:18,fontWeight:700,color:'#ef4444'}}>{r1(recipe.f*q)}g</div><div style={{fontSize:11,color:'var(--subtext)'}}>fat</div></div>
          </div>
          <div style={{fontSize:13,fontWeight:600,color:'var(--subtext)',marginBottom:8}}>Servings</div>
          <input type="number" value={qty} min="0.5" step="0.5" onChange={e=>setQty(e.target.value)} style={{fontSize:20,fontWeight:700,textAlign:'center',marginBottom:10}}/>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            {['0.5','1','1.5','2'].map(v=>(

            ))}

          <div style={{fontSize:13,fontWeight:600,color:'var(--subtext)',marginBottom:10}}>Meal</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
            {MEALS.map(m=>(
              <button key={m} className={`btn btn-sm${meal===m?' btn-primary':' btn-secondary'}`} onClick={()=>setMeal(m)}>{MEAL_ICONS[m]} {m}</button>
            ))}
          </div>
          <button className="btn btn-primary btn-block" onClick={()=>{if(q>0)onLog(q,meal);}}>Add to {meal}</button>
        </div>
      </div>
    </div>
  );
}

function SettingsTab({goals, setGoals, log, onSwitchProfile, profileName, profileEmoji}) {
  const [local, setLocal] = useState({...goals});
  const changed = JSON.stringify(local)!==JSON.stringify(goals);
  const allEntries = Object.values(log).flat();
  const totalDays = Object.keys(log).filter(d=>log[d].length>0).length;
  const avgCal = totalDays>0 ? Math.round(allEntries.reduce((s,e)=>s+e.cal,0)/totalDays) : 0;
  const topFood = allEntries.length>0
    ? Object.entries(allEntries.reduce((a,e)=>({...a,[e.name]:(a[e.name]||0)+1}),{})).sort((a,b)=>b[1]-a[1])[0]
    : null;
  return (
    <div>
      <div className="card" style={{marginTop:12}}>
        <div style={{fontWeight:700,fontSize:16,marginBottom:2}}>Daily Goals</div>
        <div style={{fontSize:12,color:'var(--subtext)',marginBottom:14}}>Set your nutrition targets</div>
        {[{key:'calories',label:'Calories',unit:'kcal',color:'var(--green)'},{key:'protein',label:'Protein',unit:'g',color:'#3b82f6'},{key:'carbs',label:'Carbohydrates',unit:'g',color:'#f59e0b'},{key:'fat',label:'Fat',unit:'g',color:'#ef4444'}].map(({key,label,unit,color})=>(
          <div key={key} className="settings-row">
            <div><div className="settings-label" style={{color}}>{label}</div><div style={{fontSize:12,color:'var(--subtext)'}}>{unit} per day</div></div>
            <input className="settings-input" type="number" value={local[key]} min="0"
              onChange={e=>setLocal(p=>({...p,[key]:parseFloat(e.target.value)||0}))}/>
          </div>
        ))}
        {changed && <button className="btn btn-primary btn-block" style={{marginTop:12}} onClick={()=>setGoals(local)}>Save Goals</button>}
      </div>
      <div className="card">
        <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Your Stats</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          <div style={{background:'var(--bg)',borderRadius:12,padding:12,textAlign:'center'}}>
            <div style={{fontSize:26,fontWeight:800,color:'var(--green)'}}>{totalDays}</div>
            <div style={{fontSize:12,color:'var(--subtext)'}}>days logged</div>
          </div>
          <div style={{background:'var(--bg)',borderRadius:12,padding:12,textAlign:'center'}}>
            <div style={{fontSize:26,fontWeight:800,color:'#3b82f6'}}>{avgCal||'—'}</div>
            <div style={{fontSize:12,color:'var(--subtext)'}}>avg cal/day</div>
          </div>
          {topFood && <div style={{background:'var(--bg)',borderRadius:12,padding:12,textAlign:'center',gridColumn:'1/-1'}}>
            <div style={{fontSize:14,fontWeight:700,color:'#f59e0b'}}>{topFood[0]}</div>
            <div style={{fontSize:12,color:'var(--subtext)'}}>most logged ({topFood[1]}x)</div>
          </div>}
        </div>
      </div>
      <div className="card">
        <div style={{fontWeight:700,fontSize:15,marginBottom:10}}>Quick Macro Presets</div>
        {[{label:'🔥 Fat Loss',cal:1600,p:160,c:130,f:55},{label:'⚖️ Maintain',cal:2000,p:150,c:220,f:65},{label:'💪 Muscle Gain',cal:2600,p:185,c:310,f:75}].map(({label,cal,p,c,f})=>(
          <div key={label} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
            <div>
              <div style={{fontWeight:600,fontSize:14}}>{label}</div>
              <div style={{fontSize:12,color:'var(--subtext)'}}>{cal} cal · P:{p}g C:{c}g F:{f}g</div>
            </div>
            <button className="btn btn-secondary btn-sm" onClick={()=>{const g={calories:cal,protein:p,carbs:c,fat:f};setLocal(g);setGoals(g);}}>Use</button>
          </div>
        ))}
      </div>
      <div className="card">
        <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>📱 Add to iPhone Home Screen</div>
        <div style={{fontSize:13,color:'var(--subtext)',lineHeight:1.7}}>
          <div>1. Open <strong>caltrack.html</strong> in <strong>Safari</strong></div>
          <div>2. Tap the <strong>Share</strong> button (box with arrow ↑)</div>
          <div>3. Tap <strong>"Add to Home Screen"</strong></div>
          <div>4. Tap <strong>Add</strong></div>
          <div style={{marginTop:8,padding:10,background:'var(--green-light)',borderRadius:8,color:'var(--green-dark)'}}>
            ✅ All your data saves to your device automatically
          </div>
        </div>
      </div>
      <div className="card" style={{marginBottom:32}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>👤 Current Profile</div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,padding:'12px 14px',background:'var(--bg)',borderRadius:12}}>
          <span style={{fontSize:32}}>{profileEmoji}</span>
          <div>
            <div style={{fontWeight:700,fontSize:16}}>{profileName}</div>
            <div style={{fontSize:12,color:'var(--subtext)'}}>Logged in</div>
          </div>
        </div>
        <button className="btn btn-secondary btn-block" onClick={onSwitchProfile}>
          🔄 Switch Profile
        </button>
      </div>
    </div>
  );
}
