*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0A0A0A; --surface: #141414; --surface-2: #1E1E1E;
  --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
  --orange: #F97316; --orange-dim: rgba(249,115,22,0.12); --orange-glow: 0 0 24px rgba(249,115,22,0.35);
  --green: #22C55E; --green-dim: rgba(34,197,94,0.12);

  --blue: #3B82F6; --blue-dim: rgba(59,130,246,0.12);

html, body {

.app { display: flex; flex-direction: column; height: 100%; background: var(--bg); }

/* Header */
.header { background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: calc(10px + var(--safe-top)) 16px 10px; position: sticky; top: 0; z-index: 50; }

.date-nav { display: flex; align-items: center; gap: 6px; }
.date-btn { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface-2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--subtext); transition: all 0.2s; }
.date-btn:active { background: var(--border-strong); }

.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 8px; cursor: pointer; gap: 4px; border: none; background: none; color: var(--muted); transition: color 0.2s; min-height: 56px; }
.nav-item.active { color: var(--orange); }

.nav-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
.nav-pip { width: 4px; height: 4px; border-radius: 50%; background: var(--orange); opacity: 0; transition: opacity 0.2s; margin-top: 2px; }

/* Cards */
.card { background: var(--surface); border-radius: 18px; padding: 16px; margin: 0 12px 10px; border: 1px solid var(--border); }

/* Buttons */

input:focus { border-color: var(--orange); background: var(--surface); }

/* Modals */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); overscroll-behavior: contain; }
.modal { background: var(--surface); border-radius: 24px 24px 0 0; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 16px calc(100px + var(--safe-bottom)); animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1); border-top: 1px solid var(--border-strong); }

.modal-close { width: 36px; height: 36px; min-width: 36px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--subtext); transition: all 0.2s; }
.modal-close:active { background: var(--border-strong); }

/* Food Items */
.food-item { display: flex; align-items: center; padding: 12px 16px; gap: 12px; border-bottom: 1px solid var(--border); cursor: pointer; background: var(--surface); transition: background 0.15s; }

.food-cal { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; color: var(--orange); flex-shrink: 0; }

.chip { display: inline-flex; align-items: center; padding: 7px 14px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; border: 1px solid var(--border); background: var(--surface-2); cursor: pointer; white-space: nowrap; color: var(--subtext); transition: all 0.2s; letter-spacing: 0.2px; }

.toast { position: fixed; top: calc(80px + var(--safe-top)); left: 50%; transform: translateX(-50%); background: var(--surface); color: var(--text); border: 1px solid var(--border-strong); padding: 10px 20px; border-radius: 20px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 600; z-index: 200; animation: fadeInOut 2s ease forwards; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

/* Water */
.water-btn { width: 44px; height: 44px; border-radius: 12px; border: 1.5px solid var(--border); background: var(--surface-2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; color: var(--muted); }

function uid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16)
  );
}
function todayStr() {
  const d = new Date();
  // Use local date (not UTC) to avoid off-by-one at night in US timezones
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDate(d) {
  const [y,m,day] = d.split('-').map(Number);
  const date = new Date(y,m-1,day);
  const opts = {weekday:'short',month:'short',day:'numeric'};
  return date.toLocaleDateString('en-US',opts);
}
function addDays(d, n) {
  // Parse as numbers first — string '07' + 1 = '071' = 71 days, causing May bug
  const [y,m,day] = d.split('-').map(Number);
  const dt = new Date(y, m-1, day+n);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function r1(n) { return Math.round(n*10)/10; }

function CircularProgress({value, max, size=150, stroke=12, color='#F97316', children}) {
  const r2 = (size-stroke)/2;
  const circ = 2*Math.PI*r2;
  const pct = Math.min(Math.max(value/max,0),1);
  const dash = pct*circ;
  return (
    <div className="ring-container" style={{width:size,height:size,position:'relative'}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)',display:'block'}}>
        <circle cx={size/2} cy={size/2} r={r2} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r2} fill="none" stroke={color}
          strokeWidth={stroke} strokeLinecap="round"
          strokeDasharray={`${dash} ${circ}`} style={{transition:'stroke-dasharray 0.5s ease',filter:`drop-shadow(0 0 8px ${color}80)`}}/>
      </svg>
      <div className="ring-center">{children}</div>
    </div>
  );
}

function PinPad({value, onChange, maxLen=6}) {
  const digits = [1,2,3,4,5,6,7,8,9,'',0,'⌫'];
  return (
    <div>
      {/* dots */}
      <div style={{display:'flex',justifyContent:'center',gap:14,marginBottom:24}}>
        {Array.from({length:maxLen}).map((_,i)=>(
          <div key={i} style={{width:14,height:14,borderRadius:'50%',
            background: i < value.length ? 'var(--orange)' : 'var(--surface-2)',
            border:'2px solid '+(i < value.length ? 'var(--orange)' : 'var(--border-strong)'),
            transition:'all 0.15s'}}/>
        ))}
      </div>
      {/* grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
        {digits.map((d,i)=>{
          if(d==='') return <div key={i}/>;
          const isBack = d==='⌫';
          return (
            <button key={i} onClick={()=>{
              if(isBack) onChange(value.slice(0,-1));
              else if(value.length < maxLen) onChange(value+d);
            }} style={{
              height:56,borderRadius:14,fontSize:isBack?22:20,fontWeight:700,
              fontFamily:"'Barlow Condensed',sans-serif",
              background: isBack ? 'var(--surface-2)' : 'var(--surface)',
              border:'1.5px solid var(--border)',color:'var(--text)',
              cursor:'pointer',transition:'all 0.1s',letterSpacing:0,
              WebkitTapHighlightColor:'transparent'
            }}>{d}</button>
          );
        })}
      </div>
    </div>
  );
}

  const [loginProfile, setLoginProfile] = useState(null);
  const [pinEntry, setPinEntry] = useState('');
  const [usernameEntry, setUsernameEntry] = useState('');
  const [newName, setNewName] = useState('');
  const [newEmoji, setNewEmoji] = useState(PROFILE_EMOJIS[0]);
  const [newPin, setNewPin] = useState('');
  const [newPin2, setNewPin2] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  useEffect(()=>{
    async function load(){
      try {
        const timeout = new Promise(resolve => setTimeout(resolve, 10000));
        const fetch = sb.from('ct_profiles').select('*');
        const res = await Promise.race([fetch, timeout.then(()=>({data:[],error:'timeout'}))]);
        setProfiles(res.data||[]);
      } catch(err) {
        console.error('Profile load error:', err);
        setProfiles([]);
      }
    }
    load();
  },[]);

  async function doCreate() {
    if(!newName.trim()){setErr('Name required');return;}
    if(newPin.length<4){setErr('PIN must be 4+ digits');return;}
    if(newPin!==newPin2){setErr('PINs do not match');return;}
    setBusy(true);
    const hashedPin = await hashPin(newPin);
    const res = await sb.from('ct_profiles').insert({
      id:uid(),emoji:newEmoji,name:newName.trim(),pin_hash:hashedPin
    }).select();
    if(res.data?.length){
      const p = res.data[0];
      localStorage.setItem('ct_active',JSON.stringify({id:p.id,name:p.name,emoji:p.emoji}));
      onSelect({id:p.id,name:p.name,emoji:p.emoji});
    }else{
      setErr('Failed to create — check connection and try again');
      setBusy(false);
    }
  }

  async function doLogin() {
    if(!loginProfile) return;
    const hash = await hashPin(pinEntry);
    if(hash === loginProfile.pin_hash) {
      localStorage.setItem('ct_active',JSON.stringify({id:loginProfile.id,name:loginProfile.name,emoji:loginProfile.emoji}));
      onSelect({id:loginProfile.id,name:loginProfile.name,emoji:loginProfile.emoji});
    } else {
      setErr('Wrong PIN — try again');
      setPinEntry('');
    }
  }

  // Auto-submit when PIN reaches correct length (PIN pad flow only)
  useEffect(()=>{
    if(loginProfile && view==='login' && pinEntry.length >= 4) {
      doLogin();
    }
  },[pinEntry]);

  // ── Username + PIN sign-in ──
  async function doSignIn() {
    if(!usernameEntry.trim()){setErr('Enter your username');return;}
    if(!pinEntry){setErr('Enter your PIN');return;}
    setBusy(true);
    setErr('');
    const match = profiles.find(p => p.name.toLowerCase()===usernameEntry.trim().toLowerCase());
    if(!match){setErr('Username not found');setBusy(false);return;}
    const hash = await hashPin(pinEntry);
    if(hash===match.pin_hash){
      localStorage.setItem('ct_active',JSON.stringify({id:match.id,name:match.name,emoji:match.emoji}));
      onSelect({id:match.id,name:match.name,emoji:match.emoji});
    } else {
      setErr('Wrong PIN — try again');
      setPinEntry('');
      setBusy(false);
    }
  }

  // ── Sign-in form view ──
  if(view==='signin') return (
    <div className="profile-screen">
      <div className="profile-hero">
        <div className="profile-logo">🥗</div>
        <div className="profile-app-name">CalTrack</div>
        <div className="profile-tagline">Sign in to your account</div>
      </div>
      <div className="profile-body">
        <div style={{marginBottom:14}}>
          <div className="form-label">Username</div>
          <input
            type="text" autoCapitalize="none" autoCorrect="off" spellCheck="false"
            placeholder="Enter your name"
            value={usernameEntry}
            onChange={e=>{setUsernameEntry(e.target.value);setErr('');}}
            onKeyDown={e=>{if(e.key==='Enter')document.getElementById('pin-input')?.focus();}}
            style={{background:'var(--surface-2)',border:'1.5px solid var(--border-strong)',borderRadius:12,
              padding:'14px 16px',fontSize:16,width:'100%',outline:'none',color:'var(--text)',
              fontFamily:"'Barlow',sans-serif"}}
          />
        </div>
        <div style={{marginBottom:6}}>
          <div className="form-label">PIN</div>
          <input
            id="pin-input"
            type="password" inputMode="numeric"
            placeholder="••••"
            value={pinEntry}
            onChange={e=>{setPinEntry(e.target.value.replace(/\D/g,''));setErr('');}}
            onKeyDown={e=>{if(e.key==='Enter')doSignIn();}}
            style={{background:'var(--surface-2)',border:'1.5px solid var(--border-strong)',borderRadius:12,
              padding:'14px 16px',fontSize:20,width:'100%',outline:'none',color:'var(--text)',
              letterSpacing:'6px'}}
          />
        </div>
        {err && <div style={{color:'var(--red)',fontSize:13,marginBottom:10,marginTop:4}}>{err}</div>}
        <button className="btn btn-primary btn-block" style={{marginTop:16,fontSize:17,padding:'15px'}}
          onClick={doSignIn} disabled={busy}>
          {busy ? 'Signing in…' : 'Sign In →'}
        </button>
        <button className="btn btn-secondary btn-block" style={{marginTop:10}}
          onClick={()=>{setView('list');setErr('');setUsernameEntry('');setPinEntry('');}}>
          ← Back
        </button>
      </div>
    </div>
  );

  // ── Login view (PIN pad — kept as fallback) ──
  if(view==='login' && loginProfile) return (
    <div className="profile-screen">
      <div className="profile-hero">
        <div className="profile-logo">{loginProfile.emoji}</div>
        <div className="profile-app-name" style={{fontSize:32}}>{loginProfile.name}</div>
        <div className="profile-tagline">Enter your PIN to sign in</div>
      </div>
      <div className="profile-body">
        <PinPad value={pinEntry} onChange={v=>{setPinEntry(v);setErr('');}} maxLen={6}/>
        {err && <div style={{color:'var(--red)',fontSize:13,textAlign:'center',marginTop:12}}>{err}</div>}
        <button className="btn btn-primary btn-block" style={{marginTop:20}} onClick={doLogin} disabled={pinEntry.length<4}>
          Sign In →
        </button>
        <button className="btn btn-secondary btn-block" style={{marginTop:10}} onClick={()=>{setView('list');setPinEntry('');setErr('');}}>
          ← All Profiles
        </button>
      </div>
    </div>
  );

  // ── Create view ──
  if(view==='create') return (
    <div className="profile-screen">
      <div className="profile-hero">
        <div className="profile-logo">✨</div>
        <div className="profile-app-name" style={{fontSize:28}}>New Profile</div>
        <div className="profile-tagline">Set up your CalTrack account</div>
      </div>
      <div className="profile-body">
        <div className="profile-card">
        <div className="profile-card-title">Create your profile</div>
        <div style={{fontSize:12,fontWeight:600,color:'var(--subtext)',marginBottom:6}}>CHOOSE AN AVATAR</div>
        <div className="emoji-grid" style={{marginBottom:14}}>
          {PROFILE_EMOJIS.map(e=>(
            <button key={e} className={`emoji-option${newEmoji===e?' selected':''}`} onClick={()=>setNewEmoji(e)}>{e}</button>
          ))}
        </div>
        <div style={{marginBottom:10}}>
          <div className="form-label">YOUR NAME</div>
          <input type="text" placeholder="e.g. Jeff" value={newName} onChange={e=>{setNewName(e.target.value);setErr('');}}
            style={{background:'var(--surface-2)',border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',fontSize:16,width:'100%',outline:'none',color:'var(--text)'}}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
          <div>
            <div className="form-label">PIN (4+ digits)</div>
            <input type="password" inputMode="numeric" placeholder="••••" value={newPin} onChange={e=>{setNewPin(e.target.value.replace(/\D/g,''));setErr('');}}
              style={{background:'var(--surface-2)',border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',fontSize:16,width:'100%',outline:'none',color:'var(--text)'}}/>
          </div>
          <div>
            <div className="form-label">CONFIRM PIN</div>
            <input type="password" inputMode="numeric" placeholder="••••" value={newPin2} onChange={e=>{setNewPin2(e.target.value.replace(/\D/g,''));setErr('');}}
              style={{background:'var(--surface-2)',border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',fontSize:16,width:'100%',outline:'none',color:'var(--text)'}}/>
          </div>
        </div>
        {err && <div style={{color:'var(--red)',fontSize:13,marginBottom:10}}>{err}</div>}
        <button className="btn btn-primary btn-block" onClick={doCreate} disabled={busy}>
          {busy ? 'Creating…' : 'Create Profile →'}
        </button>
        <button className="btn btn-secondary btn-block" style={{marginTop:10}} onClick={()=>{setView('list');setErr('');}}>← Back</button>
      </div>
      </div>
    </div>
  );

  // ── Profile picker (after tapping Sign In) ──
  if(view==='select') return (
    <div className="profile-screen">
      <div className="profile-hero">
        <div className="profile-logo">🥗</div>
        <div className="profile-app-name">CalTrack</div>
        <div className="profile-tagline">Who&#39;s tracking today?</div>
      </div>
      <div className="profile-body">
        <div className="profile-section-label">Choose your profile</div>
        <div className="profile-list">
          {profiles.map(p=>(
            <button key={p.id} className="profile-btn" onClick={()=>{setLoginProfile(p);setPinEntry('');setErr('');setView('login');}}>
              <div className="profile-btn-avatar">{p.emoji}</div>
              <div className="profile-btn-info">
                <div className="profile-btn-name">{p.name}</div>
                <div className="profile-btn-sub">Enter PIN to sign in</div>
              </div>
              <div className="profile-btn-chevron">›</div>
            </button>
          ))}
        </div>
        <button className="btn btn-secondary btn-block" style={{marginTop:8}} onClick={()=>setView('list')}>← Back</button>
      </div>
    </div>
  );

  // ── Main landing ──
  return (
    <div className="profile-screen">
      {/* Hero branding strip */}
      <div className="profile-hero">
        <div className="profile-logo">🥗</div>
        <div className="profile-app-name">CalTrack</div>
        <div className="profile-tagline">Your personal calorie &amp; macro tracker</div>
      </div>

      {/* Body */}
      <div className="profile-body">
        {profiles.length === 0 && (
          <div style={{textAlign:'center',padding:'24px 0 28px'}}>
            <div style={{fontSize:48,marginBottom:12}}>👋</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:800,color:'var(--text)',marginBottom:6}}>Welcome to CalTrack</div>
            <div style={{fontSize:14,color:'var(--subtext)'}}>Create your first profile to get started</div>
          </div>
        )}

        {profiles.length > 0 && (
          <button className="btn btn-primary btn-block" style={{marginBottom:12,fontSize:18,padding:'16px',letterSpacing:'0.5px'}}
            onClick={()=>{setErr('');setUsernameEntry('');setPinEntry('');setView('signin');}}>
            Sign In →
          </button>
        )}

        {/* New profile button */}
        <button className="profile-new-btn" onClick={()=>{setErr('');setNewName('');setNewPin('');setNewPin2('');setView('create');}}>
          <div className="profile-new-icon">+</div>
          <div>
            <div className="profile-new-label">Add New Profile</div>
            <div className="profile-new-sub">Create a profile with a PIN</div>
          </div>
        </button>
      </div>
    </div>
  );
}

// ── ProfileGate ───────────────────────────────────────────────────────────────
function ProfileGate() {
  const [activeProfile, setActiveProfile] = React.useState(()=>{
    try{return JSON.parse(localStorage.getItem('ct_active')||'null')}catch(e){return null}
  });
  function selectProfile(p) { localStorage.setItem('ct_active', JSON.stringify(p)); setActiveProfile(p); }
  function switchProfile() {
    localStorage.removeItem('ct_active');
    setActiveProfile(null);
  }
  function updateProfile(updates) {
    const updated = {...activeProfile,...updates};
    localStorage.setItem('ct_active', JSON.stringify(updated));
    setActiveProfile(updated);
  }
  if(!activeProfile) return <ProfileScreen onSelect={selectProfile}/>;
  return <App profileId={activeProfile.id} profileName={activeProfile.name} profileEmoji={activeProfile.emoji} onSwitchProfile={switchProfile} onUpdateProfile={updateProfile}/>;
}

function App({profileId, profileName, profileEmoji, onSwitchProfile, onUpdateProfile}) {
  const [tab, setTab] = useState('dashboard');
  const [date, setDate] = useState(todayStr);
  // Initialize log from localStorage immediately so data survives refresh
  const [log, setLog] = useState(()=>{
    try { const c=localStorage.getItem(`ct_log_${profileId}`); return c?JSON.parse(c):{}; } catch{return {};}
  });
  const [recipes, setRecipes] = useState([]);
  const [goals, setGoals] = useState(DEFAULT_GOALS);
  const [water, setWater] = useState({});
  const [addModal, setAddModal] = useState(null);
  const [recipeModal, setRecipeModal] = useState(null);
  const [logRecipeModal, setLogRecipeModal] = useState(null);
  const [toast, setToast] = useState(null);
  const [showCreate, setShowCreate] = useState(false);
  const [defaultMeal, setDefaultMeal] = useState('Breakfast');
  const [syncing, setSyncing] = useState(true);

  // Supplement list + daily check state (localStorage-backed)
  const [supplements, setSupplements] = useState(()=>{
    try { const c=localStorage.getItem(`ct_supps_${profileId}`); return c?JSON.parse(c):[]; } catch{return [];}
  });
  const [suppChecks, setSuppChecks] = useState(()=>{
    try { const c=localStorage.getItem(`ct_supp_checks_${profileId}`); return c?JSON.parse(c):{}; } catch{return {};}
  });
  function saveSupplements(list) {
    setSupplements(list);
    try { localStorage.setItem(`ct_supps_${profileId}`, JSON.stringify(list)); } catch{}
  }
  function toggleSuppCheck(suppId, date) {
    setSuppChecks(prev=>{
      const dateChecks = {...(prev[date]||{})};
      dateChecks[suppId] = !dateChecks[suppId];
      const next = {...prev,[date]:dateChecks};
      try { localStorage.setItem(`ct_supp_checks_${profileId}`, JSON.stringify(next)); } catch{}
      return next;
    });
  }

  // Write-through cache: every log mutation also saves to localStorage instantly
  const updateLog = useCallback((updater) => {
    setLog(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      try { localStorage.setItem(`ct_log_${profileId}`, JSON.stringify(next)); } catch{}
      return next;
    });
  }, [profileId]);

  // ── Load all data from Supabase on mount ──────────────────────────────────
  useEffect(()=>{
    async function loadAll() {
      setSyncing(true);
      try {
        // Timeout safety: if Supabase doesn't respond in 10s, proceed anyway
        const timeout = new Promise(resolve => setTimeout(resolve, 10000));
        const fetchAll = Promise.all([
          sb.from('ct_food_logs').select('*').eq('profile_id', profileId),
          sb.from('ct_recipes').select('*').eq('profile_id', profileId),
          sb.from('ct_goals').select('*').eq('profile_id', profileId).single(),
          sb.from('ct_water').select('*').eq('profile_id', profileId),
        ]);
        const result = await Promise.race([fetchAll, timeout.then(()=>null)]);
        if(result) {
          const [logsRes, recipesRes, goalsRes, waterRes] = result;
          // Build log dict: {date: [entries]}
          const logDict = {};
          for(const row of (logsRes.data||[])){
            const e = {id:row.id,foodId:row.food_id,name:row.name,srv:row.srv,qty:row.qty,
              cal:row.cal,p:row.p,c:row.c,f:row.f,meal:row.meal,time:row.time};
            if(!logDict[row.date]) logDict[row.date]=[];
            logDict[row.date].push(e);
          }
          updateLog(logDict);
          setRecipes((recipesRes.data||[]).map(r=>({id:r.id,name:r.name,servings:r.servings,
            cal:r.cal,p:r.p,c:r.c,f:r.f,ingredients:r.ingredients||[]})));
          if(goalsRes.data) setGoals({calories:goalsRes.data.calories,protein:goalsRes.data.protein,
            carbs:goalsRes.data.carbs,fat:goalsRes.data.fat});
          const waterDict = {};
          for(const row of (waterRes.data||[])) waterDict[row.date]=row.glasses;
          setWater(waterDict);
        }
      } catch(err) {
        console.error('CalTrack load error:', err);
      } finally {
        setSyncing(false);
      }
    }
    loadAll();
  },[profileId]);

  const showToast = useCallback(msg=>{ setToast(msg); setTimeout(()=>setToast(null),2000); },[]);
  const dayEntries = useMemo(()=>log[date]||[],[log,date]);
  const dayTotals = useMemo(()=>dayEntries.reduce((a,e)=>({cal:a.cal+e.cal,p:a.p+e.p,c:a.c+e.c,f:a.f+e.f}),{cal:0,p:0,c:0,f:0}),[dayEntries]);
  const waterToday = water[date]||0;

  async function addEntry(food, qty, meal) {
    const entry = {id:uid(),foodId:food.id,name:food.name,srv:food.srv,qty,
      cal:r1(food.cal*qty),p:r1(food.p*qty),c:r1(food.c*qty),f:r1(food.f*qty),
      meal,time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
    // Save to localStorage immediately (write-through) — survives refresh even if Supabase is slow
    updateLog(prev=>({...prev,[date]:[...(prev[date]||[]),entry]}));
    showToast('Added '+food.name);
    const {error} = await sb.from('ct_food_logs').insert({id:entry.id,profile_id:profileId,date,
      name:entry.name,srv:entry.srv,qty,cal:entry.cal,p:entry.p,c:entry.c,f:entry.f,
      meal,time:entry.time,food_id:food.id||null});
    if(error) {
      console.error('Save failed, entry kept in local cache:', error);
      // Entry is still in localStorage — will re-sync next time if needed
    }
  }
  async function removeEntry(id) {
    updateLog(prev=>({...prev,[date]:(prev[date]||[]).filter(e=>e.id!==id)}));
    await sb.from('ct_food_logs').delete().eq('id',id);
  }
  async function saveRecipe(recipe) {
    if(recipe.id){
      const updated = {...recipe};
      setRecipes(prev=>prev.map(r=>r.id===recipe.id?updated:r));
      showToast('Recipe updated!');
      await sb.from('ct_recipes').update({name:recipe.name,servings:recipe.servings,
        cal:recipe.cal,p:recipe.p,c:recipe.c,f:recipe.f,ingredients:recipe.ingredients})
        .eq('id',recipe.id);
    } else {
      const newR = {...recipe,id:uid()};
      setRecipes(prev=>[...prev,newR]);
      showToast('Recipe saved!');
      await sb.from('ct_recipes').insert({id:newR.id,profile_id:profileId,name:newR.name,
        servings:newR.servings,cal:newR.cal,p:newR.p,c:newR.c,f:newR.f,ingredients:newR.ingredients});
    }
  }
  async function deleteRecipe(id) {
    setRecipes(prev=>prev.filter(r=>r.id!==id));
    showToast('Recipe deleted');
    await sb.from('ct_recipes').delete().eq('id',id);
  }
  async function logRecipe(recipe, qty, meal) {
    const entry = {id:uid(),foodId:null,name:recipe.name+' (recipe)',srv:`${qty} serving${qty!==1?'s':''}`,qty,
      cal:r1(recipe.cal*qty),p:r1(recipe.p*qty),c:r1(recipe.c*qty),f:r1(recipe.f*qty),meal,
      time:new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})};
    updateLog(prev=>({...prev,[date]:[...(prev[date]||[]),entry]}));
    showToast('Logged '+recipe.name);
    await sb.from('ct_food_logs').insert({id:entry.id,profile_id:profileId,date,
      name:entry.name,srv:entry.srv,qty,cal:entry.cal,p:entry.p,c:entry.c,f:entry.f,
      meal,time:entry.time,food_id:null});
  }
  async function saveGoals(g) {
    setGoals(g);
    await sb.from('ct_goals').upsert({profile_id:profileId,calories:g.calories,
      protein:g.protein,carbs:g.carbs,fat:g.fat,updated_at:new Date().toISOString()});
  }
  async function saveWater(date, glasses) {
    setWater(prev=>({...prev,[date]:glasses}));
    await sb.from('ct_water').upsert({profile_id:profileId,date,glasses});
  }
  function closeAll(){ setAddModal(null); setRecipeModal(null); setLogRecipeModal(null); }

  if(syncing) return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:14,background:'var(--bg)'}}>
      <div style={{width:64,height:64,borderRadius:20,background:'var(--orange-dim)',border:'1px solid rgba(249,115,22,0.3)',display:'flex',alignItems:'center',justifyContent:'center'}}>
        <Icon name="flame" size={28} color="var(--orange)"/>
      </div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:700,color:'var(--subtext)',letterSpacing:'0.5px'}}>LOADING…</div>
    </div>
  );

  return (
    <div className="app">
      {toast && <div key={toast+Date.now()} className="toast">{toast}</div>}
      <div className="header">
        <div className="header-inner">
          <button onClick={onSwitchProfile} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:8,padding:0,minHeight:44}}>
            <span style={{fontSize:24,lineHeight:1}}>{profileEmoji}</span>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:700,color:'var(--subtext)',maxWidth:64,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{profileName}</span>
          </button>
          <span className="header-brand">CalTrack</span>
        </div>
      </div>
      <div className="scroll-area">
        {tab==='dashboard' && <DashboardTab date={date} setDate={setDate} log={log} entries={dayEntries} totals={dayTotals} goals={goals} waterToday={waterToday} onWater={glasses=>saveWater(date,glasses)} onAddFood={meal=>{setDefaultMeal(meal);setTab('search');}} onRemove={removeEntry} onQuickAdd={(cal,meal)=>addEntry({id:uid(),name:'Quick Add',icon:'⚡',srv:`${cal} cal`,cal,p:0,c:0,f:0},1,meal)} supplements={supplements} suppChecks={suppChecks[date]||{}} onSuppCheck={id=>toggleSuppCheck(id,date)} onSaveSupplements={saveSupplements}/>}
        {tab==='search' && <SearchTab defaultMeal={defaultMeal} onAdd={addEntry} profileId={profileId} profileName={profileName} showCreate={showCreate} onCreateHandled={()=>setShowCreate(false)}/>}
        {tab==='recipes' && <RecipesTab recipes={recipes} onNew={()=>setRecipeModal({mode:'new',recipe:null})} onView={r=>setRecipeModal({mode:'view',recipe:r})} onEdit={r=>setRecipeModal({mode:'edit',recipe:r})} onLog={r=>setLogRecipeModal(r)}/>}
        {tab==='settings' && <SettingsTab goals={goals} setGoals={saveGoals} log={log} onSwitchProfile={onSwitchProfile} profileName={profileName} profileEmoji={profileEmoji} profileId={profileId} onUpdateProfile={onUpdateProfile}/>}
      </div>
      <nav className="bottom-nav">
        {[
          {id:'dashboard',icon:'chart',label:'Dashboard'},
          {id:'search',icon:'search',label:'Log Food'},
          {id:'recipes',icon:'book',label:'Recipes'},
          {id:'settings',icon:'sliders',label:'Goals'}
        ].map(n=>(

// ── Image preprocessor: grayscale + contrast boost for better OCR ────────────
function preprocessForOCR(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      // Scale up small images, cap large ones at 2000px wide
      const scale = Math.min(3, Math.max(1, 1600 / img.width));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      // Draw base image
      ctx.drawImage(img, 0, 0, w, h);
      // Pixel-level grayscale + contrast boost
      const id = ctx.getImageData(0, 0, w, h);
      const d = id.data;
      for(let i=0;i<d.length;i+=4){
        // Weighted grayscale
        let g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        // Contrast stretch: push toward black/white
        g = Math.min(255, Math.max(0, (g - 128) * 1.6 + 128));
        d[i]=d[i+1]=d[i+2]=g;
      }
      ctx.putImageData(id, 0, 0);
      URL.revokeObjectURL(url);
      canvas.toBlob(resolve, 'image/png');
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}

// ── Robust nutrition label parser ────────────────────────────────────────────
function parseLabelText(raw) {
  // Fix common OCR mistakes then split into lines for line-by-line matching
  const fixed = raw
    .replace(/[Oo](?=\d)/g,'0').replace(/(?<=\d)[Oo]/g,'0') // O→0 near digits
    .replace(/[lI](?=\d)/g,'1').replace(/(?<=\d)[lI]/g,'1') // l/I→1 near digits
    .replace(/,(\d)/g,'.$1');                                  // 12,5g → 12.5g
  const lines = fixed.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const full  = lines.join(' ');

  function num(s){ const n=parseFloat(s); return isNaN(n)?null:n; }

  // Line-by-line: match "Label   123" or "Label 123g" patterns
  function lineMatch(labelRx) {
    for(const line of lines){
      if(labelRx.test(line)){
        const m = line.match(/(\d+\.?\d*)\s*g?\b/g);
        if(m){ const v=num(m[0].replace(/g/,'')); if(v!==null&&v<10000) return v; }
      }
    }
    return null;
  }

  // Full-text fallback patterns (handles single-line / wrapped text)
  function fullMatch(patterns){
    for(const rx of patterns){
      const m = full.match(rx);
      if(m){ const v=num(m[1]); if(v!==null&&v<10000) return v; }
    }
    return null;
  }

  const cal = lineMatch(/^cal(?:ories)?/i) ??
    fullMatch([
      /calories[^\d]*(\d+\.?\d*)/i,
      /(\d+\.?\d*)\s*(?:cal|kcal)(?:ories)?\b/i,
      /energy[^\d]*(\d+\.?\d*)\s*(?:kcal|cal)/i,
    ]);

  const fat = lineMatch(/^total\s*fat/i) ??
    lineMatch(/^fat\b/i) ??
    fullMatch([
      /total\s*fat[^\d]*(\d+\.?\d*)\s*g/i,
      /\bfat[^\d\w]*(\d+\.?\d*)\s*g/i,
    ]);

  const carbs = lineMatch(/^total\s*carb/i) ??
    lineMatch(/^carbohydrate/i) ??
    fullMatch([
      /total\s*carbohydrate[^\d]*(\d+\.?\d*)\s*g/i,
      /carbohydrate[^\d]*(\d+\.?\d*)\s*g/i,
      /total\s*carb[^\d]*(\d+\.?\d*)\s*g/i,
      /\bcarbs?[^\d]*(\d+\.?\d*)\s*g/i,
    ]);

  const protein = lineMatch(/^protein/i) ??
    fullMatch([
      /protein[^\d]*(\d+\.?\d*)\s*g/i,
      /(\d+\.?\d*)\s*g\s*protein/i,
    ]);

  // Serving size — try to grab the description after "Serving Size"
  let srv = null;
  for(const line of lines){
    if(/serving size/i.test(line)){
      const rest = line.replace(/serving size[:\s]*/i,'').trim();
      if(rest.length>0 && rest.length<40) { srv=rest; break; }
    }
  }
  if(!srv){
    const m=full.match(/serving size[:\s]*([^\n,.]{3,35})/i);
    if(m) srv=m[1].trim();
  }

  return { cal, fat, carbs, protein, srv };
}

function CustomFoodModal({onSave, onClose, profileId, profileName}) {
  const [name, setName]   = useState('');
  const [brand, setBrand] = useState('');
  const [srv, setSrv]     = useState('1 serving');
  const [cal, setCal]     = useState('');
  const [p, setP]         = useState('');
  const [c, setC]         = useState('');
  const [f, setF]         = useState('');
  const [busy, setBusy]   = useState(false);
  const [err, setErr]     = useState('');
  const [scanning, setScanning]   = useState(false);
  const [scanMsg, setScanMsg]     = useState('');
  const [previewUrl, setPreviewUrl] = useState(null);
  const [rawText, setRawText]     = useState('');
  const [showRaw, setShowRaw]     = useState(false);
  const fileRef = useRef(null);

  async function handleScan(e) {
    const file = e.target.files?.[0];
    if(!file) return;
    setPreviewUrl(URL.createObjectURL(file));
    setScanning(true); setScanMsg('Enhancing image…'); setErr(''); setRawText(''); setShowRaw(false);
    try {
      setScanMsg('Preprocessing image…');
      const processed = await preprocessForOCR(file);
      setScanMsg('Loading OCR engine…');
      const result = await Tesseract.recognize(processed, 'eng', {
        tessedit_pageseg_mode: '6',   // assume uniform text block
        preserve_interword_spaces: '1',
        logger: m => {
          if(m.status==='recognizing text') setScanMsg(`Reading label… ${Math.round(m.progress*100)}%`);
          else if(m.status==='loading tesseract core') setScanMsg('Loading OCR…');
        }
      });
      const text = result.data.text;
      setRawText(text);
      const parsed = parseLabelText(text);
      let filled=0, details=[];
      if(parsed.cal!=null){  setCal(String(parsed.cal));   filled++; details.push(`${parsed.cal} cal`); }
      if(parsed.protein!=null){ setP(String(parsed.protein)); filled++; details.push(`${parsed.protein}g protein`); }
      if(parsed.carbs!=null){ setC(String(parsed.carbs));  filled++; details.push(`${parsed.carbs}g carbs`); }
      if(parsed.fat!=null){   setF(String(parsed.fat));    filled++; details.push(`${parsed.fat}g fat`); }
      if(parsed.srv){ setSrv(parsed.srv); }
      if(filled>0){
        setScanMsg(`✓ Found: ${details.join(' · ')} — review below`);
      } else {
        setScanMsg('⚠ Could not read values — check image clarity and fill in manually');
      }
    } catch(ex){
      setScanMsg('Scan failed — try a clearer, well-lit photo');
      console.error('OCR error:', ex);
    }
    setScanning(false);
    e.target.value='';
  }

  async function handleSave() {
    if(!name.trim()){setErr('Food name required');return;}
    if(!cal||isNaN(parseFloat(cal))){setErr('Calories required');return;}
    setBusy(true);
    const food = {
      id:uid(), profile_id:profileId, uploaded_by:profileName,
      name:name.trim(), brand:brand.trim(), category:'Custom',
      srv:srv.trim()||'1 serving',
      cal:parseFloat(cal)||0, p:parseFloat(p)||0,
      c:parseFloat(c)||0,     f:parseFloat(f)||0, uses:1
    };
    const {error} = await sb.from('ct_community_foods').insert(food);
    if(error){setErr('Failed to save — try again');setBusy(false);return;}
    onSave({...food,icon:'⭐',cat:'Custom',community:true});
  }

  const iStyle = {background:'var(--surface-2)',border:'1.5px solid var(--border)',borderRadius:10,
    padding:'11px 13px',fontSize:15,width:'100%',outline:'none',color:'var(--text)',fontFamily:"'Barlow',sans-serif"};

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:800}}>Create Custom Food</div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'var(--subtext)',fontSize:22,cursor:'pointer',lineHeight:1}}>✕</button>
        </div>

        {/* Scan button */}
        <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handleScan}/>
        <button onClick={()=>fileRef.current?.click()} disabled={scanning} style={{
          width:'100%',display:'flex',alignItems:'center',justifyContent:'center',gap:10,
          padding:'13px',borderRadius:14,marginBottom:12,cursor:scanning?'default':'pointer',
          background:scanning?'var(--surface-2)':'linear-gradient(135deg,#1a0d00,#2a1800)',
          border:'1.5px solid '+(scanning?'var(--border)':'var(--orange)'),
          color:scanning?'var(--muted)':'var(--orange)',
          fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,letterSpacing:'0.5px'}}>
          <span style={{fontSize:20}}>📷</span>
          {scanning ? scanMsg : 'Scan Nutrition Label'}

function SearchTab({defaultMeal, onAdd, profileId, profileName, showCreate, onCreateHandled}) {
  const [q, setQ] = useState('');
  const [cat, setCat] = useState('All');
  const [selected, setSelected] = useState(null);
  const [showCustom, setShowCustom] = useState(false);
  const [communityFoods, setCommunityFoods] = useState([]);
  const [loadingCommunity, setLoadingCommunity] = useState(false);

  // Open modal when triggered from bottom nav +Create
  useEffect(()=>{
    if(showCreate){ setShowCustom(true); onCreateHandled?.(); }
  },[showCreate]);

  // Load community foods on mount and when search changes
  useEffect(()=>{
    let cancelled = false;
    async function loadCommunity(){
      setLoadingCommunity(true);
      try {
        let query = sb.from('ct_community_foods').select('*').order('uses',{ascending:false}).limit(100);
        if(q) query = query.ilike('name',`%${q}%`);
        const {data} = await query;
        if(!cancelled) setCommunityFoods((data||[]).map(r=>({
          id:'comm_'+r.id, _communityId:r.id, name:r.name,
          brand:r.brand, srv:r.srv, cal:r.cal, p:r.p, c:r.c, f:r.f,
          cat:'Custom', icon:'⭐', community:true,
          uploadedBy:r.uploaded_by, uses:r.uses
        })));
      } catch(e){ /* ignore */ }
      if(!cancelled) setLoadingCommunity(false);
    }
    loadCommunity();
    return ()=>{cancelled=true;};
  },[q]);

  const localResults = useMemo(()=>{
    let list = FOODS;
    if(cat!=='All') list = list.filter(f=>f.cat===cat);
    if(q){ const lq=q.toLowerCase(); list=list.filter(f=>f.name.toLowerCase().includes(lq)||f.cat.toLowerCase().includes(lq)); }
    return list;
  },[q,cat]);

  const communityFiltered = useMemo(()=>{
    if(cat!=='All') return [];
    return communityFoods;
  },[communityFoods, cat]);

  // Merge community + local, sorted by relevance then alpha
  const allResults = useMemo(()=>{
    const combined = [...localResults, ...communityFiltered];
    if(q){
      const lq = q.toLowerCase();
      combined.sort((a,b)=>{
        const ai = a.name.toLowerCase().indexOf(lq);
        const bi = b.name.toLowerCase().indexOf(lq);
        if(ai !== bi) return ai - bi;
        return a.name.localeCompare(b.name);
      });
    } else {
      combined.sort((a,b)=>a.name.localeCompare(b.name));
    }
    return combined;
  },[localResults, communityFiltered, q]);

  async function handleAddCommunityFood(food, qty, meal) {
    onAdd(food, qty, meal);
    // Increment uses counter
    if(food._communityId) {
      await sb.from('ct_community_foods').update({uses: (food.uses||1)+1}).eq('id', food._communityId);
    }
  }

  function handleCustomSaved(food) {
    setCommunityFoods(prev=>[{...food,id:'comm_'+food.id,_communityId:food.id,uploadedBy:food.uploaded_by||profileName,uses:1}, ...prev]);
    setShowCustom(false);
    setSelected(food);
  }

  const showEmpty = allResults.length===0 && !loadingCommunity;

  return (
    <div>
      <div style={{padding:'12px 12px 0'}}>
        <div style={{position:'relative'}}>
          <div style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'var(--muted)',pointerEvents:'none'}}>
            <Icon name="search" size={18}/>
          </div>
          <input type="search" placeholder="Search foods + community uploads..." value={q} onChange={e=>setQ(e.target.value)} style={{paddingLeft:44}}/>
        </div>
      </div>

      {/* Category chips */}
      <div className="chips-row" style={{padding:'10px 12px 6px',gap:6,overflowX:'auto'}}>
        {CATEGORIES.map(c=>(
          <div key={c} className={`chip${cat===c?' active':''}`} onClick={()=>setCat(c)} style={{cursor:'pointer',flexShrink:0}}>{c}</div>
        ))}
      </div>

      <div className="card-flush">
        {showEmpty && (
          <div className="empty-state">
            <div className="empty-state-icon"><Icon name="search" size={24} color="var(--muted)"/></div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>No foods found</div>
            <div style={{fontSize:13,marginBottom:12}}>Try a different search or create a custom food</div>
            <button onClick={()=>setShowCustom(true)} style={{
              background:'var(--orange)',border:'none',borderRadius:10,padding:'10px 18px',
              color:'#fff',fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:800,cursor:'pointer'
            }}>+ Create Custom Food</button>
          </div>
        )}
        {allResults.slice(0,80).map(food=>(
          <div key={food.id} className="food-item" onClick={()=>setSelected(food)}
            style={food.community?{borderLeft:'3px solid var(--orange)',paddingLeft:13}:{}}>
            <div className="food-icon"><span>{food.icon}</span></div>
            <div className="food-info">
              <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                <div className="food-name">{food.name}</div>
                {food.community && <span style={{fontSize:10,fontWeight:700,color:'var(--orange)',background:'var(--orange-dim)',borderRadius:4,padding:'1px 5px',flexShrink:0}}>COMMUNITY</span>}
              </div>
              {food.brand && <div style={{fontSize:11,color:'var(--muted)',marginBottom:2}}>{food.brand}</div>}
              <div className="food-meta">{food.srv}{food.community && food.uploadedBy ? ` · by ${food.uploadedBy}` : ''}</div>
              <div style={{display:'flex',gap:4,marginTop:4}}>
                <span className="macro-pill pill-p">P{food.p}g</span>
                <span className="macro-pill pill-c">C{food.c}g</span>
                <span className="macro-pill pill-f">F{food.f}g</span>
              </div>
            </div>
            <div className="food-cal">{food.cal}</div>
          </div>
        ))}
      </div>

      {selected && (
        <AddFoodModal
          food={selected} defaultMeal={defaultMeal}
          onAdd={(qty,meal)=>{
            selected.community ? handleAddCommunityFood(selected,qty,meal) : onAdd(selected,qty,meal);
            setSelected(null);
          }}
          onClose={()=>setSelected(null)}
        />
      )}
      {showCustom && (
        <CustomFoodModal
          profileId={profileId} profileName={profileName}
          onSave={handleCustomSaved}
          onClose={()=>setShowCustom(false)}
        />
      )}
    </div>
  );
}

function CalendarView({log, goals, date, setDate}) {
  const [y0,m0] = date.split('-').map(Number);
  const [calYear, setCalYear] = React.useState(y0);
  const [calMonth, setCalMonth] = React.useState(m0);
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const daysInMonth = new Date(calYear, calMonth, 0).getDate();
  const startDow = new Date(calYear, calMonth-1, 1).getDay();
  const cells = [];
  for(let i=0;i<startDow;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);
  function dayStr(d){ return `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function prevMonth(){ if(calMonth===1){setCalYear(y=>y-1);setCalMonth(12);}else setCalMonth(m=>m-1); }
  function nextMonth(){ if(calMonth===12){setCalYear(y=>y+1);setCalMonth(1);}else setCalMonth(m=>m+1); }
  const today = todayStr();
  return (
    <div className="card" style={{marginTop:0}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <button className="date-btn" onClick={prevMonth}><Icon name="chevLeft" size={16}/></button>
        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:16,letterSpacing:'0.3px'}}>{MONTHS[calMonth-1]} {calYear}</span>
        <button className="date-btn" onClick={nextMonth}><Icon name="chevRight" size={16}/></button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:4}}>
        {DOW.map(d=><div key={d} style={{textAlign:'center',fontSize:10,fontWeight:700,color:'var(--muted)',padding:'2px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
        {cells.map((d,i)=>{
          if(d===null) return <div key={i}/>;
          const ds = dayStr(d);
          const entries = log[ds]||[];
          const cal = Math.round(entries.reduce((s,e)=>s+e.cal,0));
          const isToday = ds===today;
          const isSelected = ds===date;
          const goal = goals?.calories||2000;
          const pct = Math.min(cal/goal,1);
          const hasData = entries.length>0;
          const calColor = pct>=1?'#EF4444':pct>=0.75?'#F59E0B':'#22C55E';
          return (
            <div key={i} onClick={()=>setDate(ds)} style={{
              borderRadius:8,padding:'5px 2px',cursor:'pointer',textAlign:'center',
              background:isSelected?'var(--orange)':isToday?'var(--surface-2)':'transparent',
              border:isToday&&!isSelected?'1.5px solid var(--orange)':'1.5px solid transparent',
              minHeight:44,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              transition:'all 0.15s'
            }}>
              <div style={{fontSize:13,fontWeight:isToday?800:500,color:isSelected?'#fff':'var(--text)',lineHeight:1}}>{d}</div>
              {hasData && <div style={{fontSize:9,fontWeight:700,color:isSelected?'rgba(255,255,255,0.9)':calColor,marginTop:3,lineHeight:1}}>{cal}</div>}
              {hasData && !isSelected && (
                <div style={{width:'80%',height:2,borderRadius:2,marginTop:2,background:`linear-gradient(to right,${calColor} ${pct*100}%,var(--border) ${pct*100}%)`}}/>
              )}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:12,marginTop:10,justifyContent:'center'}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:8,height:8,borderRadius:2,background:'#22C55E'}}/><span style={{fontSize:10,color:'var(--muted)'}}>Under goal</span></div>
        <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:8,height:8,borderRadius:2,background:'#F59E0B'}}/><span style={{fontSize:10,color:'var(--muted)'}}>75%+</span></div>
        <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:8,height:8,borderRadius:2,background:'#EF4444'}}/><span style={{fontSize:10,color:'var(--muted)'}}>Over goal</span></div>
      </div>
    </div>
  );
}

function RecipeModal({mode, recipe, onSave, onDelete, onLog, onClose}) {
  const [localMode, setLocalMode] = useState(mode);
  const [name, setName] = useState(recipe?.name||'');
  const [servings, setServings] = useState(recipe?.servings||1);
  const [ingredients, setIngredients] = useState(recipe?.ingredients||[]);
  const [search, setSearch] = useState('');
  const [showSearch, setShowSearch] = useState(false);
  const [ingQty, setIngQty] = useState({});
  const isView = localMode==='view';

  const totals = useMemo(()=>{
    const t = ingredients.reduce((a,i)=>({cal:a.cal+i.cal,p:a.p+i.p,c:a.c+i.c,f:a.f+i.f}),{cal:0,p:0,c:0,f:0});
    const s = Math.max(servings,1);
    return {cal:r1(t.cal/s),p:r1(t.p/s),c:r1(t.c/s),f:r1(t.f/s)};
  },[ingredients,servings]);

  const filteredFoods = useMemo(()=>{
    if(!search) return FOODS.slice(0,25);
    const lq=search.toLowerCase();
    return FOODS.filter(f=>f.name.toLowerCase().includes(lq)||f.cat.toLowerCase().includes(lq)).slice(0,30);
  },[search]);

  function addIng(food) {
    const qty = parseFloat(ingQty[food.id])||1;
    setIngredients(prev=>[...prev,{foodId:food.id,name:food.name,icon:food.icon,srv:food.srv,qty,cal:r1(food.cal*qty),p:r1(food.p*qty),c:r1(food.c*qty),f:r1(food.f*qty)}]);
    setShowSearch(false); setSearch('');
    setIngQty(prev=>{const n={...prev};delete n[food.id];return n;});
  }
  function removeIng(idx) { setIngredients(prev=>prev.filter((_,i)=>i!==idx)); }
  const canSave = name.trim() && ingredients.length>0;

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxHeight:'92vh'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-header">
          <span className="modal-title">{localMode==='view'?recipe.name:localMode==='edit'?'Edit Recipe':'Build Recipe'}</span>
          <button className="modal-close" onClick={onClose} aria-label="Close"><Icon name="x" size={16}/></button>
        </div>
        <div style={{padding:16}}>
          {!isView && (
            <>
              <div style={{marginBottom:12}}>
                <div className="form-label">Recipe name</div>
                <input type="text" placeholder="e.g. Morning Smoothie Bowl" value={name} onChange={e=>setName(e.target.value)}/>
              </div>
              <div style={{marginBottom:12}}>
                <div className="form-label">Makes how many servings?</div>
                <input type="number" value={servings} min="1" step="0.5" onChange={e=>setServings(parseFloat(e.target.value)||1)}/>
              </div>
            </>
          )}
          {ingredients.length>0 && (
            <div style={{background:'var(--green-dim)',borderRadius:12,padding:12,marginBottom:14,display:'flex',justifyContent:'space-around',textAlign:'center',border:'1px solid rgba(34,197,94,0.2)'}}>
              <div><div style={{fontSize:20,fontWeight:800,color:'var(--green)'}}>{Math.round(totals.cal)}</div><div style={{fontSize:10,color:'var(--subtext)'}}>cal/srv</div></div>
              <div><div style={{fontSize:16,fontWeight:700,color:'#3b82f6'}}>{totals.p}g</div><div style={{fontSize:10,color:'var(--subtext)'}}>protein</div></div>

              <div><div style={{fontSize:16,fontWeight:700,color:'#ef4444'}}>{totals.f}g</div><div style={{fontSize:10,color:'var(--subtext)'}}>fat</div></div>
            </div>
          )}

          {ingredients.map((ing,i)=>(

              <span style={{fontSize:18}}>{ing.icon||'🍽️'}</span>
              <div className="log-entry-info">
                <div className="log-entry-name">{ing.name}</div>
                <div className="log-entry-meta">{ing.qty!==1?`${ing.qty}x `:''}1 serving · {Math.round(ing.cal)} cal</div>
              </div>

            </div>
          ))}
          {!isView && !showSearch && (
            <button className="add-row-btn" onClick={()=>setShowSearch(true)}><Icon name="plus" size={14}/>Add ingredient</button>
          )}
          {!isView && showSearch && (
            <div style={{marginTop:8}}>
              <input type="search" placeholder="Search ingredient..." value={search} onChange={e=>setSearch(e.target.value)} autoFocus style={{marginBottom:8}}/>
              <div style={{maxHeight:180,overflowY:'auto',borderRadius:10,border:'1.5px solid var(--border)',background:'var(--surface-2)'}}>
                {filteredFoods.map(food=>(
                  <div key={food.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',borderBottom:'1px solid var(--border)',cursor:'pointer'}}>
                    <span style={{fontSize:18}}>{food.icon}</span>
                    <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>addIng(food)}>
                      <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text)'}}>{food.name}</div>
                      <div style={{fontSize:11,color:'var(--subtext)'}}>{food.srv} · {food.cal} cal</div>
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:4}} onClick={e=>e.stopPropagation()}>
                      <input type="number" value={ingQty[food.id]||''} min="0.25" step="0.5"
                        onChange={e=>setIngQty(prev=>({...prev,[food.id]:e.target.value}))}
                        style={{width:44,fontSize:13,padding:'4px 6px',textAlign:'center',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',outline:'none'}}/>
                      <button className="btn btn-primary btn-sm" onClick={()=>addIng(food)}><Icon name="plus" size={12}/></button>
                    </div>
                  </div>
                ))}
              </div>
              <button className="btn btn-secondary btn-sm" style={{marginTop:8,width:'100%'}} onClick={()=>setShowSearch(false)}>Cancel</button>
            </div>
          )}
          <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:8}}>
            {isView ? (
              <>
                <button className="btn btn-primary btn-block" onClick={()=>onLog(recipe)}>Log This Recipe</button>
                <button className="btn btn-secondary btn-block" onClick={()=>setLocalMode('edit')}>✏️ Edit Recipe</button>
                <button className="btn btn-danger btn-block" onClick={()=>onDelete(recipe.id)}>Delete Recipe</button>
              </>
            ) : (
              <button className="btn btn-primary btn-block" disabled={!canSave} style={{opacity:canSave?1:0.5}}
                onClick={()=>{if(canSave)onSave({...(recipe||{}),name:name.trim(),servings:Math.max(1,servings),ingredients,...totals});}}>
                {localMode==='edit'?'Update Recipe':'Save Recipe'}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function SettingsTab({goals, setGoals, log, onSwitchProfile, profileName, profileEmoji, profileId, onUpdateProfile}) {
  const [local, setLocal] = useState({...goals});
  const [editEmoji, setEditEmoji] = useState(false);
  const [busyEmoji, setBusyEmoji] = useState(false);
  const [calcSex, setCalcSex] = useState('male');
  const [calcAge, setCalcAge] = useState('');
  const [calcWeightLbs, setCalcWeightLbs] = useState('');
  const [calcHeightFt, setCalcHeightFt] = useState('');
  const [calcHeightIn, setCalcHeightIn] = useState('');
  const [calcActivity, setCalcActivity] = useState('moderate');
  const [calcResults, setCalcResults] = useState(null);
  function calculateGoals() {
    const age = parseInt(calcAge);
    const lbs = parseFloat(calcWeightLbs);
    const ft = parseInt(calcHeightFt)||0;
    const inches = parseFloat(calcHeightIn)||0;
    if (!age || !lbs || (ft===0 && inches===0)) return;
    const kg = lbs * 0.453592;
    const cm = (ft * 12 + inches) * 2.54;
    const bmr = calcSex==='male'
      ? (10*kg + 6.25*cm - 5*age + 5)
      : (10*kg + 6.25*cm - 5*age - 161);
    const factors = {sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very:1.9};
    const tdee = Math.round(bmr * factors[calcActivity]);
    function macros(cal, proteinG) {
      const fat = Math.round(cal * 0.25 / 9);
      const carbs = Math.round(Math.max(cal - proteinG*4 - fat*9, 0) / 4);
      return {calories:cal, protein:proteinG, carbs, fat};
    }
    setCalcResults({
      tdee,
      fatLoss: macros(Math.max(tdee-500, 1200), Math.round(lbs*1.0)),
      maintain: macros(tdee, Math.round(lbs*0.8)),
      muscleGain: macros(tdee+300, Math.round(lbs*1.0))
    });
  }
  async function saveEmoji(emoji) {
    setBusyEmoji(true);
    await sb.from('ct_profiles').update({emoji}).eq('id', profileId);
    onUpdateProfile?.({emoji});
    setBusyEmoji(false);
    setEditEmoji(false);
  }
  const changed = JSON.stringify(local)!==JSON.stringify(goals);
  const allEntries = Object.values(log).flat();
  const totalDays = Object.keys(log).filter(d=>log[d].length>0).length;
  const avgCal = totalDays>0 ? Math.round(allEntries.reduce((s,e)=>s+e.cal,0)/totalDays) : 0;
  const topFood = allEntries.length>0
    ? Object.entries(allEntries.reduce((a,e)=>({...a,[e.name]:(a[e.name]||0)+1}),{})).sort((a,b)=>b[1]-a[1])[0]
    : null;
  return (
    <div>
      <div className="card" style={{marginTop:12}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,marginBottom:2,letterSpacing:'0.3px'}}>GOAL CALCULATOR</div>
        <div style={{fontSize:12,color:'var(--subtext)',marginBottom:14}}>Get personalized calorie &amp; macro targets</div>
        <div className="settings-row">
          <div className="settings-label">Biological Sex</div>
          <div style={{display:'flex',gap:6}}>
            {['male','female'].map(s=>(
              <button key={s} onClick={()=>setCalcSex(s)}
                style={{padding:'6px 16px',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',
                  background:calcSex===s?'var(--orange)':'var(--surface-2)',
                  color:calcSex===s?'#000':'var(--subtext)',
                  border:calcSex===s?'2px solid var(--orange)':'2px solid var(--border)'}}>
                {s.charAt(0).toUpperCase()+s.slice(1)}
              </button>
            ))}
          </div>
        </div>
        <div className="settings-row">
          <div>
            <div className="settings-label">Age</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>years</div>
          </div>
          <input className="settings-input" type="number" placeholder="28" value={calcAge} min="10" max="100"
            onChange={e=>setCalcAge(e.target.value)}/>
        </div>
        <div className="settings-row">
          <div>
            <div className="settings-label">Weight</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>lbs</div>
          </div>
          <input className="settings-input" type="number" placeholder="175" value={calcWeightLbs} min="50" max="600"
            onChange={e=>setCalcWeightLbs(e.target.value)}/>
        </div>
        <div className="settings-row">
          <div>
            <div className="settings-label">Height</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>ft &amp; in</div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <input className="settings-input" type="number" placeholder="5" value={calcHeightFt} min="3" max="8"
              style={{width:58}} onChange={e=>setCalcHeightFt(e.target.value)}/>
            <span style={{color:'var(--subtext)',fontSize:12,fontWeight:700}}>ft</span>
            <input className="settings-input" type="number" placeholder="10" value={calcHeightIn} min="0" max="11"
              style={{width:58}} onChange={e=>setCalcHeightIn(e.target.value)}/>
            <span style={{color:'var(--subtext)',fontSize:12,fontWeight:700}}>in</span>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div className="settings-label" style={{marginBottom:8}}>Activity Level</div>
          {[
            {key:'sedentary',label:'Sedentary',desc:'Desk job, little/no exercise'},
            {key:'light',label:'Light',desc:'Light exercise 1–3 days/week'},
            {key:'moderate',label:'Moderate',desc:'Exercise 3–5 days/week'},
            {key:'active',label:'Active',desc:'Hard exercise 6–7 days/week'},
            {key:'very',label:'Very Active',desc:'Physical job + hard training'},
          ].map(({key,label,desc})=>(
            <div key={key} onClick={()=>setCalcActivity(key)}
              style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'10px 12px',borderRadius:10,marginBottom:6,cursor:'pointer',
                background:calcActivity===key?'var(--orange-dim)':'var(--surface-2)',
                border:calcActivity===key?'1.5px solid var(--orange)':'1.5px solid var(--border)'}}>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:calcActivity===key?'var(--orange)':'var(--text)'}}>{label}</div>
                <div style={{fontSize:11,color:'var(--subtext)'}}>{desc}</div>
              </div>
              {calcActivity===key && <span style={{color:'var(--orange)',fontSize:16,fontWeight:900}}>✓</span>}
            </div>
          ))}
        </div>
        <button className="btn btn-primary btn-block" onClick={calculateGoals}>⚡ Calculate My Goals</button>
        {calcResults && (
          <div style={{marginTop:16}}>
            <div style={{textAlign:'center',marginBottom:12,padding:'10px',background:'var(--surface-2)',borderRadius:10,border:'1px solid var(--border)'}}>
              <span style={{fontSize:12,color:'var(--subtext)'}}>Estimated Daily Maintenance </span>
              <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:'var(--text)'}}>{calcResults.tdee} cal</span>
            </div>
            {[
              {key:'fatLoss',label:'FAT LOSS',color:'#EF4444',icon:'🔥',desc:'500 cal deficit · lean out'},
              {key:'maintain',label:'MAINTAIN',color:'#F59E0B',icon:'⚖️',desc:'At maintenance · stay steady'},
              {key:'muscleGain',label:'MUSCLE GAIN',color:'#22C55E',icon:'💪',desc:'300 cal surplus · build mass'},
            ].map(({key,label,color,icon,desc})=>{
              const r = calcResults[key];
              return (
                <div key={key} style={{marginBottom:10,padding:14,borderRadius:14,
                  background:'var(--surface-2)',border:`1.5px solid ${color}44`}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                    <div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:16,color,letterSpacing:'0.3px'}}>{icon} {label}</div>
                      <div style={{fontSize:11,color:'var(--subtext)'}}>{desc}</div>
                    </div>
                    <button className="btn btn-secondary btn-sm"
                      onClick={()=>{setLocal(r);setGoals(r);}}
                      style={{fontSize:12,fontWeight:700,padding:'6px 14px'}}>Apply</button>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-around',textAlign:'center'}}>
                    <div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,color}}>{r.calories}</div>
                      <div style={{fontSize:10,color:'var(--subtext)',fontWeight:600}}>CAL</div>
                    </div>
                    <div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,color:'#3B82F6'}}>{r.protein}g</div>
                      <div style={{fontSize:10,color:'var(--subtext)',fontWeight:600}}>PROTEIN</div>
                    </div>
                    <div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,color:'#F59E0B'}}>{r.carbs}g</div>
                      <div style={{fontSize:10,color:'var(--subtext)',fontWeight:600}}>CARBS</div>
                    </div>
                    <div>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,color:'#EF4444'}}>{r.fat}g</div>
                      <div style={{fontSize:10,color:'var(--subtext)',fontWeight:600}}>FAT</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="card" style={{marginTop:12}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,marginBottom:2,letterSpacing:'0.3px'}}>DAILY GOALS</div>
        <div style={{fontSize:12,color:'var(--subtext)',marginBottom:14}}>Set your nutrition targets</div>
        {[
          {key:'calories',label:'Calories',unit:'kcal',color:'var(--orange)'},
          {key:'protein',label:'Protein',unit:'g',color:'#3B82F6'},
          {key:'carbs',label:'Carbohydrates',unit:'g',color:'#F59E0B'},
          {key:'fat',label:'Fat',unit:'g',color:'#EF4444'}
        ].map(({key,label,unit,color})=>(
          <div key={key} className="settings-row">
            <div>
              <div className="settings-label" style={{color}}>{label}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{unit} per day</div>
            </div>
            <input className="settings-input" type="number" value={local[key]} min="0"
              onChange={e=>setLocal(p=>({...p,[key]:parseFloat(e.target.value)||0}))}/>
          </div>
        ))}
        {changed && <button className="btn btn-primary btn-block" style={{marginTop:14}} onClick={()=>setGoals(local)}>Save Goals</button>}
      </div>

      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,letterSpacing:'0.3px'}}>PROFILE</div>
          <button onClick={()=>setEditEmoji(e=>!e)} style={{background:'none',border:'1px solid var(--border)',borderRadius:8,color:'var(--subtext)',fontSize:12,fontWeight:600,padding:'4px 10px',cursor:'pointer'}}>{editEmoji?'Done':'Edit Emoji'}</button>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:editEmoji?14:0}}>
          <span style={{fontSize:48,lineHeight:1}}>{profileEmoji}</span>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:800}}>{profileName}</div>

                  border:profileEmoji===e?'2px solid var(--orange)':'2px solid transparent',
                  borderRadius:12,padding:'8px',cursor:'pointer',transition:'all 0.15s',

                {e}

          <div style={{background:'var(--surface-2)',borderRadius:14,padding:14,textAlign:'center',border:'1px solid var(--border)'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:900,color:'var(--orange)'}}>{totalDays}</div>

          </div>
          <div style={{background:'var(--surface-2)',borderRadius:14,padding:14,textAlign:'center',border:'1px solid var(--border)'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:30,fontWeight:900,color:'#3B82F6'}}>{avgCal||'—'}</div>
            <div style={{fontSize:12,color:'var(--subtext)'}}>avg cal/day</div>
          </div>
          {topFood && <div style={{background:'var(--surface-2)',borderRadius:14,padding:14,textAlign:'center',gridColumn:'1/-1',border:'1px solid var(--border)'}}>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:'#F59E0B'}}>{topFood[0]}</div>
            <div style={{fontSize:12,color:'var(--subtext)'}}>most logged ({topFood[1]}×)</div>
          </div>}
        </div>
      </div>

      <div className="card">
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,marginBottom:14,letterSpacing:'0.3px'}}>QUICK PRESETS</div>
        {[
          {label:'Fat Loss',cal:1600,p:160,c:130,f:55,color:'#EF4444'},
          {label:'Maintain',cal:2000,p:150,c:220,f:65,color:'#F59E0B'},
          {label:'Muscle Gain',cal:2600,p:185,c:310,f:75,color:'#22C55E'}
        ].map(({label,cal,p,c,f,color})=>(
          <div key={label} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0',borderBottom:'1px solid var(--border)'}}>
            <div>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,color,letterSpacing:'0.3px'}}>{label.toUpperCase()}</div>
              <div style={{fontSize:12,color:'var(--subtext)',marginTop:2}}>{cal} cal · P:{p}g C:{c}g F:{f}g</div>
            </div>
            <button className="btn btn-secondary btn-sm" onClick={()=>{const g={calories:cal,protein:p,carbs:c,fat:f};setLocal(g);setGoals(g);}}>Use</button>
          </div>
        ))}
      </div>

        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,marginBottom:6,letterSpacing:'0.3px'}}>INSTALL ON IPHONE</div>

          <div>1. Open in <strong style={{color:'var(--text)'}}>Safari</strong></div>
          <div>2. Tap the <strong style={{color:'var(--text)'}}>Share ↑</strong> button</div>

          <div>4. Tap <strong style={{color:'var(--text)'}}>Add</strong></div>

      </div>

      <div className="card" style={{marginBottom:32}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,marginBottom:14,letterSpacing:'0.3px'}}>PROFILE</div>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,padding:'12px 14px',background:'var(--surface-2)',borderRadius:14,border:'1px solid var(--border)'}}>
          <span style={{fontSize:34}}>{profileEmoji}</span>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:18,color:'var(--text)'}}>{profileName}</div>
            <div style={{fontSize:12,color:'var(--subtext)'}}>Signed in</div>
          </div>
        </div>
        <button className="btn btn-secondary btn-block" style={{gap:8}} onClick={onSwitchProfile}>
          <Icon name="logout" size={16}/> Switch Profile
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ProfileGate/>);
</script>
</body>
</html>
